name: CI — Bronze Ingestion Layer

on:
  push:
    branches: ["main"]
    paths:
      - "pipelines/ingestion/**"
      - "tests/ingestion/**"
  pull_request:
    branches: ["main"]
    paths:
      - "pipelines/ingestion/**"
      - "tests/ingestion/**"

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r pipelines/ingestion/requirements.txt

      - name: black — check formatting
        run: black --check pipelines/ingestion/

      # - name: isort — check import order
      #   run: isort --check-only pipelines/ingestion/

      # - name: flake8 — check style & errors
      #   run: flake8 pipelines/ingestion/ --max-line-length=200 --ignore=E402,W503

  test:
    name: Unit tests — dry-run ingestion
    runs-on: ubuntu-latest
    needs: lint

    # Credenciales AWS mockeadas: boto3 no llega a conectarse en dry-run
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r pipelines/ingestion/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          PYTHONPATH: .
        working-directory: pipelines/ingestion
        run: |
          pytest ../../tests/ingestion/ \
            --cov=. \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ingestion
          path: pipelines/ingestion/.coverage
          retention-days: 7