# .github/workflows/ci_cd_gold.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI  → lint + 16 tests unitarios (sin S3 ni red)
# CD  → en push a main:
#         1. Corre build Gold completo contra S3 real
#         2. Valida Gold con Great Expectations
#         3. Corre export a open-data/
#         4. Dispara crawlers Glue para actualizar Glue Catalog
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Gold Build

on:
  push:
    branches: [main, develop]
    paths:
      - "pipelines/gold/**"
      - "tests/gold/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "pipelines/gold/**"
      - "tests/gold/**"

jobs:
  # ── CI: Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
 
      - name: Install ruff
        run: pip install ruff
 
      - name: Ruff format check
        run: ruff format --check pipelines/gold/ tests/gold/
 
      - name: Ruff lint check
        run: ruff check pipelines/gold/ tests/gold/

  # ── CI: Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests (16 tests — sin S3 ni red)
    runs-on: ubuntu-latest
    needs: lint

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas pyarrow boto3 s3fs pytest pytest-cov

      - name: Run Gold tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/gold \
            -v --tb=short \
            --cov=pipelines/gold \
            --cov-report=term-missing \
            --cov-report=xml:coverage-gold.xml \
            --cov-fail-under=75

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gold
          path: coverage-gold.xml
          retention-days: 7

  # ── CD: Deploy Gold a S3 + crawlers (solo en push a main) ────────────────
  deploy-gold:
    name: CD — Build + Validate + Export + Crawlers
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas pyarrow boto3 s3fs

      - name: Run Bronze Ingestion first
        run: |
          cd pipelines/ingestion
          pip install requests openpyxl  # deps de ingestion
          python run_ingestion.py


      - name: Transform Bronze → Silver
        run: |
          cd pipelines/transformation
          python run_transformation.py

      - name: Build Silver → Gold
        run: |
          cd pipelines/gold
          python run_gold.py
        # Si falla aquí el workflow se detiene — Gold no se actualiza
        # con datos corruptos

      - name: Validate Gold with Great Expectations
        run: |
          cd pipelines
          python expectations/run_validation.py --layer gold
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        # Si algún check falla, el workflow se detiene (opcional: cambiar a 'continue-on-error: true')
        # continue-on-error: true

      - name: Export Gold → open-data/
        run: |
          cd pipelines/gold
          python export_open_data_gold.py

      - name: Trigger Glue crawlers Gold
        run: |
          aws glue start-crawler --latam-gold-fact-tourism-emissions-crawler
          aws glue start-crawler --name latam-gold-dim-country-crawler
          echo "✅ Crawlers iniciados — Glue Catalog se actualizará en ~2-3 min"

      - name: Summary
        run: |
          echo "## Gold Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Silver → Gold construido" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Gold validado con Great Expectations" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Crawlers Glue disparados" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY