name: CI — Terraform Infra

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
  pull_request:
    branches: ["main"]
    paths:
      - "infra/**"

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "infra"

jobs:
  # ── Validación en cada PR ───────────────────────────────────────────────────
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt — check formatting
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive
        # Si falla: correr `terraform fmt -recursive` en local y commitear

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false
        # -backend=false: no intenta conectar al backend S3 en CI

      - name: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  # ── Plan en cada PR (requiere credenciales) ─────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    # Solo corre en PRs, no en push directo a main
    if: github.event_name == 'pull_request'

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="budget_notification_email=${{ secrets.BUDGET_EMAIL }}" \
            -out=tfplan \
            -no-color
        continue-on-error: false

      - name: Upload plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 3

  # ── Apply automático al mergear a main ─────────────────────────────────────
  # IMPORTANTE: Solo activo si el equipo quiere auto-deploy.
  # Para activarlo: quitar el `if: false` de abajo.
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && false
    # ↑ Cambiar `&& false` a solo `github.ref == 'refs/heads/main'` para activar

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform apply \
            -var="budget_notification_email=${{ secrets.BUDGET_EMAIL }}" \
            -auto-approve \
            -no-color