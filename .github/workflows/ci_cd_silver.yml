# .github/workflows/ci_cd_silver_transformation.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI  → lint + 28 tests unitarios (sin S3 ni red)
# CD  → en push a main:
#         1. Corre transformación Silver completa contra S3 real
#         2. Corre export a open-data/
#         3. Dispara crawlers Glue para actualizar Glue Catalog
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Silver Transformation

on:
  push:
    branches: [main, develop]
    paths:
      - "pipelines/transformation/**"
      - "tests/transformation/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "pipelines/transformation/**"
      - "tests/transformation/**"

jobs:
  # ── CI: Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install black flake8 isort

      - name: black
        run: black --check pipelines/transformation/ tests/transformation/

      - name: isort
        run: isort --check-only pipelines/transformation/ tests/transformation/

      - name: flake8
        run: |
          flake8 pipelines/transformation/ tests/transformation/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

  # ── CI: Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests (28 tests — sin S3 ni red)
    runs-on: ubuntu-latest
    needs: lint

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas pyarrow boto3 s3fs pytest pytest-cov

      - name: Run Silver tests
        run: |
          cd pipelines/transformation
          python -m pytest ../../tests/transformation/ \
            -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:../../coverage-silver.xml \
            --cov-fail-under=80

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-silver
          path: coverage-silver.xml
          retention-days: 7

  # ── CD: Deploy Silver a S3 + crawlers (solo en push a main) ────────────────
  deploy-silver:
    name: CD — Transform + Export + Crawlers
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas pyarrow boto3 s3fs

      - name: Transform Bronze → Silver
        run: |
          cd pipelines/transformation
          python run_transformation.py
        # Si falla aquí el workflow se detiene — Silver no se actualiza
        # con datos corruptos

      - name: Export Silver → open-data/
        run: |
          cd pipelines/transformation
          python export_open_data_silver.py

      - name: Trigger Glue crawlers Silver
        run: |
          aws glue start-crawler --name latam-dev-silver-co2
          aws glue start-crawler --name latam-dev-silver-tourism
          aws glue start-crawler --name latam-dev-silver-transport
          aws glue start-crawler --name latam-dev-open-data-silver
          echo "✅ Crawlers iniciados — Glue Catalog se actualizará en ~2-3 min"

      - name: Summary
        run: |
          echo "## Silver Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Bronze → Silver transformado" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Silver → open-data/ exportado" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Crawlers Glue disparados" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY